<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EventSync{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260409">
    {% block extra_css %}{% endblock %}
</head>
<body class="app-shell {% block body_class %}{% endblock %}">
    {% include "navbar.html" %}

    <main class="site-main">
        {% if messages %}
            <div class="message-stack">
                {% for message in messages %}
                    <div class="glass-card message-card message-{{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();

        const navToggle = document.querySelector("[data-navbar-toggle]");
        const navMenu = document.querySelector("[data-navbar-menu]");
        if (navToggle && navMenu) {
            navToggle.addEventListener("click", () => {
                navMenu.classList.toggle("is-open");
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
