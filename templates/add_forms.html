{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Registration Form Builder</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Field Name</label>
      <input type="text" name="field_name" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Field Type</label>
      <select name="field_type" class="form-control" required>
        <option value="text">Text</option>
        <option value="number">Number</option>
        <option value="dropdown">Dropdown</option>
      </select>
    </div>
    <button type="submit" name="add_field" class="btn btn-secondary">+ Add Field</button>
    <button type="submit" name="continue" class="btn btn-primary">Continue</button>
  </form>
  {% if fields %}
    <h4>Added Fields:</h4>
    <ul>
      {% for f in fields %}
        <li>{{ f.field_name }} ({{ f.field_type }})</li>
      {% endfor %}
    </ul>
  {% endif %}
</div>
{% endblock %}
