{% with current_name=request.resolver_match.url_name|default:'' %}
<header class="navbar">
    <a href="{% url 'events:home' %}" class="navbar-brand">
        <span class="brand-mark"><i data-lucide="zap"></i></span>
        <span class="brand-text">EventSync</span>
    </a>

    <button class="navbar-toggle" type="button" aria-label="Toggle navigation" data-navbar-toggle>
        <i data-lucide="menu"></i>
    </button>

    <nav class="navbar-links navbar-links-main{% if current_name == 'event_detail' or current_name == 'event_site' or current_name == 'event_website_home' %} is-event-nav{% endif %}" data-navbar-menu>
        <a href="{% url 'events:home' %}" class="{% if current_name == 'website-index' or current_name == 'home' %}is-active{% endif %}">Home</a>
        <a href="{% url 'events:event_create_or_list' %}" class="{% if current_name == 'event_create_or_list' or current_name == 'event_detail' %}is-active{% endif %}">Events</a>
        <a href="{% url 'events:dashboard' %}" class="{% if current_name == 'dashboard' %}is-active{% endif %}">Activities</a>
        <a href="{% url 'events:dashboard' %}#leaderboard">Leaderboard</a>
    </nav>

    <div class="navbar-links-auth">
        {% if user.is_authenticated %}
            <a href="{% url 'participant_logout' %}" class="nav-logout">Logout</a>
        {% else %}
            <a href="{% url 'accounts:unified_login' %}" class="{% if current_name == 'unified_login' or current_name == 'participant_login' or current_name == 'organizer_login' %}is-active{% endif %}">Login</a>
            <a href="{% url 'accounts:participant_signup' %}" class="nav-join">Join As Participant</a>
        {% endif %}
    </div>
</header>
{% endwith %}
